name: Build Portable Release

on:
  push:
    tags:
      - 'v*' # Trigger this workflow only when a tag like v1.0.0 is pushed

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Portable Directory (PyInstaller)
      run: |
        # --noconfirm: overwrite output dir
        # --onedir: create a portable directory instead of one file (faster launch, easier to debug)
        # --windowed: run without opening a console window
        # --add-data: bundle the assets and ui folders
        pyinstaller --noconfirm --onedir --windowed --name WindroseSync --add-data "assets;assets" --add-data "ui;ui" main.py

    - name: Package Release (ZIP) & Checksum
      id: package
      shell: pwsh
      env:
        REPO: ${{ github.repository }}
        TAG_NAME: ${{ github.ref_name }}
      run: |
        # Zip the output directory
        Compress-Archive -Path dist/WindroseSync/* -DestinationPath WindroseSync-Portable-Windows.zip
        
        # Generate the SHA256 checksum file
        $hash = (Get-FileHash WindroseSync-Portable-Windows.zip -Algorithm SHA256).Hash.ToLower()
        "$hash  WindroseSync-Portable-Windows.zip" | Out-File -FilePath WindroseSync-Portable-Windows.zip.sha256 -Encoding ascii

        # Set output variables for template replacement
        $filename = "WindroseSync-Portable-Windows.zip"
        $checksumFile = "WindroseSync-Portable-Windows.zip.sha256"
        $baseUrl = "https://github.com/$env:REPO/releases/download/$env:TAG_NAME"

        "RELEASE_FILENAME=$filename"         >> $env:GITHUB_OUTPUT
        "RELEASE_URL=$baseUrl/$filename"     >> $env:GITHUB_OUTPUT
        "CHECKSUM_URL=$baseUrl/$checksumFile" >> $env:GITHUB_OUTPUT

    - name: Generate Release Notes from Template
      shell: pwsh
      run: |
        (Get-Content .github/release_template.md) `
          -replace '<RELEASE_FILENAME>', '${{ steps.package.outputs.RELEASE_FILENAME }}' `
          -replace '<RELEASE_URL>',      '${{ steps.package.outputs.RELEASE_URL }}' `
          -replace '<CHECKSUM_URL>',     '${{ steps.package.outputs.CHECKSUM_URL }}' `
        | Set-Content .github/release_notes.md

    - name: Create GitHub Release & Upload Asset
      uses: softprops/action-gh-release@v1
      with:
        files: |
          WindroseSync-Portable-Windows.zip
          WindroseSync-Portable-Windows.zip.sha256
        body_path: .github/release_notes.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
